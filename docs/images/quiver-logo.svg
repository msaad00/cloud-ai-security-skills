<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">Quiver logo</title>
  <desc id="desc">Flat minimal mark: three upward arrows of staggered heights forming a chevron, on a dark rounded square. Quiver &#8212; agent-safe cloud and AI security skills.</desc>

  <rect x="8" y="8" width="240" height="240" rx="52" fill="#0b1628" stroke="#22314d" stroke-width="4"/>

  <!-- Left arrow -->
  <g fill="#5eead4">
    <path d="M76 74 L96 106 L84 106 L84 168 L68 168 L68 106 L56 106 Z"/>
    <path d="M62 178 L76 170 L90 178 L76 186 Z"/>
  </g>

  <!-- Center arrow (tallest) -->
  <g fill="#93c5fd">
    <path d="M128 40 L150 76 L136 76 L136 168 L120 168 L120 76 L106 76 Z"/>
    <path d="M112 180 L128 171 L144 180 L128 189 Z"/>
    <path d="M112 198 L128 189 L144 198 L128 207 Z"/>
  </g>

  <!-- Right arrow -->
  <g fill="#c4b5fd">
    <path d="M180 74 L200 106 L188 106 L188 168 L172 168 L172 106 L160 106 Z"/>
    <path d="M166 178 L180 170 L194 178 L180 186 Z"/>
  </g>

  <!-- Quiver base: shared holder strip -->
  <rect x="52" y="214" width="152" height="10" rx="5" fill="#334155"/>
</svg>
