<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="1120" viewBox="0 0 1400 1120" role="img" aria-labelledby="arch-title arch-desc">
  <title id="arch-title">cloud-ai-security-skills canonical architecture</title>
  <desc id="arch-desc">Canonical architecture diagram for cloud-ai-security-skills. The top section summarizes the seven skill layers from signals through persistence. The bottom section shows runtime surfaces: MCP through the repo MCP server, plus direct invocation from CLI, CI, and cloud runners. The diagram emphasizes one shared skill bundle and the repo's multi-format contract.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06101f"/>
      <stop offset="100%" stop-color="#0f1a33"/>
    </linearGradient>
    <radialGradient id="glowA" cx="20%" cy="12%" r="64%">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#2563eb" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="82%" cy="24%" r="48%">
      <stop offset="0%" stop-color="#c084fc" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#c084fc" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" x="0" y="0" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M36 0H0V36" fill="none" stroke="#1d2942" stroke-opacity="0.36" stroke-width="1"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#020617" flood-opacity="0.42"/>
    </filter>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0L10 5L0 10z" fill="#7dd3fc"/>
    </marker>
    <marker id="arrowTeal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0L10 5L0 10z" fill="#2dd4bf"/>
    </marker>
    <marker id="arrowPurple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0L10 5L0 10z" fill="#c084fc"/>
    </marker>
  </defs>

  <rect width="1400" height="1120" fill="url(#bg)"/>
  <rect width="1400" height="1120" fill="url(#grid)"/>
  <rect width="1400" height="1120" fill="url(#glowA)"/>
  <rect width="1400" height="1120" fill="url(#glowB)"/>

  <g font-family="Inter, Arial, sans-serif">
    <text x="56" y="72" font-size="38" font-weight="900" fill="#f8fafc">Canonical architecture: layers on top, runtime surfaces below</text>
    <text x="56" y="106" font-size="17" fill="#cbd5e1">OCSF where interop matters. Native where state, evidence, and audit matter more. One shared skill bundle across every surface.</text>

    <g filter="url(#shadow)">
      <rect x="56" y="140" width="1288" height="478" rx="32" fill="#0b1628" stroke="#26344f"/>
      <rect x="56" y="664" width="1288" height="392" rx="32" fill="#0b1628" stroke="#26344f"/>
    </g>

    <text x="88" y="184" font-size="14" font-weight="800" fill="#93c5fd" letter-spacing="1.7">LAYER MODEL</text>
    <text x="88" y="214" font-size="30" font-weight="900" fill="#f8fafc">Signal to action across seven shipped layers</text>

    <g transform="translate(88,244)">
      <rect x="0" y="0" width="150" height="34" rx="17" fill="#111827" stroke="#475569"/>
      <text x="75" y="22" text-anchor="middle" fill="#cbd5e1" font-size="12" font-weight="800" letter-spacing="1.5">SIGNALS</text>
      <rect x="254" y="0" width="136" height="34" rx="17" fill="#102345" stroke="#60a5fa"/>
      <text x="322" y="22" text-anchor="middle" fill="#dbeafe" font-size="12" font-weight="800" letter-spacing="1.5">INTAKE</text>
      <rect x="538" y="0" width="150" height="34" rx="17" fill="#10342e" stroke="#2dd4bf"/>
      <text x="613" y="22" text-anchor="middle" fill="#d1fae5" font-size="12" font-weight="800" letter-spacing="1.5">ANALYZE</text>
      <rect x="832" y="0" width="110" height="34" rx="17" fill="#3c2407" stroke="#f59e0b"/>
      <text x="887" y="22" text-anchor="middle" fill="#fde68a" font-size="12" font-weight="800" letter-spacing="1.5">ACT</text>
      <rect x="1096" y="0" width="128" height="34" rx="17" fill="#0a3130" stroke="#2dd4bf"/>
      <text x="1160" y="22" text-anchor="middle" fill="#ccfbf1" font-size="12" font-weight="800" letter-spacing="1.5">PERSIST</text>
    </g>

    <g filter="url(#shadow)">
      <rect x="88" y="302" width="176" height="232" rx="26" fill="#0f172a" stroke="#334155"/>
      <rect x="326" y="302" width="214" height="102" rx="22" fill="#112244" stroke="#60a5fa"/>
      <rect x="326" y="432" width="214" height="102" rx="22" fill="#112244" stroke="#60a5fa"/>
      <rect x="588" y="302" width="214" height="102" rx="22" fill="#10342e" stroke="#2dd4bf"/>
      <rect x="588" y="432" width="214" height="102" rx="22" fill="#10342e" stroke="#2dd4bf"/>
      <rect x="850" y="302" width="214" height="102" rx="22" fill="#3c2407" stroke="#f59e0b"/>
      <rect x="850" y="432" width="214" height="102" rx="22" fill="#3c2407" stroke="#f59e0b"/>
      <rect x="1112" y="302" width="192" height="232" rx="26" fill="#0a3130" stroke="#2dd4bf"/>
    </g>

    <text x="116" y="346" font-size="26" font-weight="800" fill="#f8fafc">Signals</text>
    <text x="116" y="388" font-size="16" fill="#cbd5e1">Cloud APIs</text>
    <text x="116" y="418" font-size="16" fill="#cbd5e1">Raw logs</text>
    <text x="116" y="448" font-size="16" fill="#cbd5e1">Identity</text>
    <text x="116" y="478" font-size="16" fill="#cbd5e1">Warehouses</text>
    <text x="116" y="516" font-size="14" fill="#94a3b8">AWS, GCP, Azure, K8s, Okta,</text>
    <text x="116" y="538" font-size="14" fill="#94a3b8">Entra, Workspace, Snowflake,</text>
    <text x="116" y="560" font-size="14" fill="#94a3b8">Databricks, ClickHouse, MCP.</text>

    <text x="354" y="336" font-size="18" font-weight="800" fill="#dbeafe">L1 Ingest</text>
    <text x="354" y="372" font-size="46" font-weight="900" fill="#ffffff">15 + 3</text>
    <text x="354" y="392" font-size="16" fill="#bfdbfe">normalize raw sources into OCSF</text>
    <text x="354" y="412" font-size="16" fill="#bfdbfe">or repo-native events</text>

    <text x="354" y="466" font-size="18" font-weight="800" fill="#dbeafe">L2 Discover</text>
    <text x="354" y="502" font-size="46" font-weight="900" fill="#ffffff">4</text>
    <text x="354" y="522" font-size="16" fill="#bfdbfe">inventory, graph, AI BOM,</text>
    <text x="354" y="542" font-size="16" fill="#bfdbfe">and evidence collection</text>

    <text x="616" y="336" font-size="18" font-weight="800" fill="#d1fae5">L3 Detect</text>
    <text x="616" y="372" font-size="46" font-weight="900" fill="#ffffff">12</text>
    <text x="616" y="392" font-size="16" fill="#99f6e4">deterministic MITRE-tagged</text>
    <text x="616" y="412" font-size="16" fill="#99f6e4">OCSF finding producers</text>

    <text x="616" y="466" font-size="18" font-weight="800" fill="#d1fae5">L4 Evaluate</text>
    <text x="616" y="502" font-size="46" font-weight="900" fill="#ffffff">7</text>
    <text x="616" y="522" font-size="16" fill="#99f6e4">82 benchmark checks across CIS,</text>
    <text x="616" y="542" font-size="16" fill="#99f6e4">container, K8s, and AI surfaces</text>

    <text x="878" y="336" font-size="18" font-weight="800" fill="#fde68a">L5 Remediate</text>
    <text x="878" y="372" font-size="46" font-weight="900" fill="#ffffff">8</text>
    <text x="878" y="392" font-size="16" fill="#fcd34d">HITL-gated, dry-run-first,</text>
    <text x="878" y="412" font-size="16" fill="#fcd34d">dual-audited write paths</text>

    <text x="878" y="466" font-size="18" font-weight="800" fill="#fde68a">L6 View</text>
    <text x="878" y="502" font-size="46" font-weight="900" fill="#ffffff">2</text>
    <text x="878" y="522" font-size="16" fill="#fcd34d">render OCSF into SARIF or</text>
    <text x="878" y="542" font-size="16" fill="#fcd34d">Mermaid for human review</text>

    <text x="1140" y="346" font-size="20" font-weight="800" fill="#ccfbf1">L7 Output</text>
    <text x="1140" y="382" font-size="46" font-weight="900" fill="#ffffff">3</text>
    <text x="1140" y="404" font-size="16" fill="#99f6e4">append-only sinks</text>
    <text x="1140" y="450" font-size="18" fill="#ecfeff">S3</text>
    <text x="1140" y="482" font-size="18" fill="#ecfeff">Snowflake</text>
    <text x="1140" y="514" font-size="18" fill="#ecfeff">ClickHouse</text>

    <path d="M264 418H302" stroke="#7dd3fc" stroke-width="4" fill="none" marker-end="url(#arrowBlue)"/>
    <path d="M540 352H566" stroke="#7dd3fc" stroke-width="4" fill="none" marker-end="url(#arrowBlue)"/>
    <path d="M540 482H566" stroke="#7dd3fc" stroke-width="4" fill="none" marker-end="url(#arrowBlue)"/>
    <path d="M802 352H828" stroke="#7dd3fc" stroke-width="4" fill="none" marker-end="url(#arrowBlue)"/>
    <path d="M802 482H828" stroke="#7dd3fc" stroke-width="4" fill="none" marker-end="url(#arrowBlue)"/>
    <path d="M1064 418H1090" stroke="#2dd4bf" stroke-width="4" fill="none" marker-end="url(#arrowTeal)"/>

    <rect x="88" y="566" width="1216" height="28" rx="14" fill="#091120" stroke="#334155"/>
    <text x="108" y="584" font-size="13" fill="#cbd5e1">Wire contract: OCSF 1.8 on ingest and detect, native on discovery and remediation, rendered output on view, pass-through on sinks.</text>

    <text x="88" y="708" font-size="14" font-weight="800" fill="#c4b5fd" letter-spacing="1.7">RUNTIME SURFACES</text>
    <text x="88" y="738" font-size="30" font-weight="900" fill="#f8fafc">One shared skill bundle, four invocation paths</text>

    <g filter="url(#shadow)">
      <rect x="88" y="774" width="246" height="184" rx="26" fill="#2c1a57" stroke="#a78bfa"/>
      <rect x="394" y="774" width="280" height="184" rx="26" fill="#4a114f" stroke="#e879f9"/>
      <rect x="734" y="744" width="376" height="244" rx="30" fill="#0b4a44" stroke="#2dd4bf"/>
      <rect x="1170" y="774" width="134" height="184" rx="26" fill="#3c2407" stroke="#f59e0b"/>
    </g>

    <text x="118" y="826" font-size="24" font-weight="800" fill="#f5f3ff">MCP clients</text>
    <text x="118" y="862" font-size="18" fill="#ddd6fe">Claude, Codex, Cursor, Windsurf,</text>
    <text x="118" y="888" font-size="18" fill="#ddd6fe">Zed, Continue, and other IDE agents</text>

    <text x="426" y="826" font-size="24" font-weight="800" fill="#fae8ff">Repo MCP server</text>
    <text x="426" y="862" font-size="18" fill="#f5d0fe">auto-discovers `SKILL.md`</text>
    <text x="426" y="888" font-size="18" fill="#f5d0fe">audits tool calls and timeouts</text>
    <text x="426" y="914" font-size="18" fill="#f5d0fe">applies allowlist policy</text>

    <text x="770" y="820" font-size="30" font-weight="900" fill="#ecfeff">Shared skill bundle</text>
    <text x="770" y="902" font-size="84" font-weight="900" fill="#ffffff">54</text>
    <text x="882" y="902" font-size="40" font-weight="800" fill="#ffffff">skills</text>
    <text x="770" y="946" font-size="22" fill="#99f6e4">same audit behavior, same HITL gates,</text>
    <text x="770" y="974" font-size="22" fill="#99f6e4">same dry-run and schema contracts</text>

    <text x="1198" y="826" font-size="24" font-weight="800" fill="#fef3c7">Outputs</text>
    <text x="1198" y="862" font-size="18" fill="#fde68a">native</text>
    <text x="1198" y="892" font-size="18" fill="#fde68a">OCSF</text>
    <text x="1198" y="922" font-size="18" fill="#fde68a">SARIF</text>
    <text x="1198" y="952" font-size="18" fill="#fde68a">Mermaid</text>

    <path d="M334 854H374" stroke="#c084fc" stroke-width="4" fill="none" marker-end="url(#arrowPurple)"/>
    <path d="M674 854H708" stroke="#c084fc" stroke-width="4" fill="none" marker-end="url(#arrowPurple)"/>
    <path d="M1110 884H1144" stroke="#2dd4bf" stroke-width="4" fill="none" marker-end="url(#arrowTeal)"/>

    <rect x="88" y="990" width="1216" height="32" rx="16" fill="#091120" stroke="#334155"/>
    <text x="108" y="1010" font-size="13" fill="#cbd5e1">CLI, CI, and cloud runners invoke the same bundle directly; MCP adds transport and audited tool mediation, not a second implementation.</text>
  </g>
</svg>
