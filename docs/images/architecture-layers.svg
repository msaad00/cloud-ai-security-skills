<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="860" viewBox="0 0 1400 860" role="img" aria-labelledby="layers-title layers-desc">
  <title id="layers-title">cloud-ai-security-skills architecture layers</title>
  <desc id="layers-desc">Layer architecture for cloud-ai-security-skills. Signals enter through intake layers, move through analyze and act layers, and finally persist through append-only output sinks. The layout emphasizes the seven shipped layers, their counts, and the repo's wire contract without overcrowding the page.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07101f"/>
      <stop offset="100%" stop-color="#0f1a33"/>
    </linearGradient>
    <radialGradient id="glowA" cx="18%" cy="10%" r="62%">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#2563eb" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="84%" cy="24%" r="48%">
      <stop offset="0%" stop-color="#14b8a6" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#14b8a6" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" x="0" y="0" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M36 0H0V36" fill="none" stroke="#1d2942" stroke-opacity="0.36" stroke-width="1"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#020617" flood-opacity="0.42"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0L10 5L0 10z" fill="#7dd3fc"/>
    </marker>
  </defs>

  <rect width="1400" height="860" fill="url(#bg)"/>
  <rect width="1400" height="860" fill="url(#grid)"/>
  <rect width="1400" height="860" fill="url(#glowA)"/>
  <rect width="1400" height="860" fill="url(#glowB)"/>

  <g font-family="Inter, Arial, sans-serif">
    <text x="72" y="82" font-size="42" font-weight="900" fill="#f8fafc">Architecture: signal to action in seven clean layers</text>
    <text x="72" y="118" font-size="18" fill="#cbd5e1">Signals come in on the left. The repo normalizes, analyzes, acts, then persists through producer-owned sinks.</text>

    <g transform="translate(72,156)">
      <rect x="0" y="0" width="150" height="36" rx="18" fill="#111827" stroke="#475569"/>
      <text x="75" y="23" text-anchor="middle" fill="#cbd5e1" font-size="13" font-weight="800" letter-spacing="1.6">SIGNALS</text>

      <rect x="232" y="0" width="146" height="36" rx="18" fill="#102345" stroke="#60a5fa"/>
      <text x="305" y="23" text-anchor="middle" fill="#dbeafe" font-size="13" font-weight="800" letter-spacing="1.6">INTAKE</text>

      <rect x="530" y="0" width="158" height="36" rx="18" fill="#10342e" stroke="#2dd4bf"/>
      <text x="609" y="23" text-anchor="middle" fill="#d1fae5" font-size="13" font-weight="800" letter-spacing="1.6">ANALYZE</text>

      <rect x="834" y="0" width="122" height="36" rx="18" fill="#3c2407" stroke="#f59e0b"/>
      <text x="895" y="23" text-anchor="middle" fill="#fde68a" font-size="13" font-weight="800" letter-spacing="1.6">ACT</text>

      <rect x="1114" y="0" width="138" height="36" rx="18" fill="#0a3130" stroke="#2dd4bf"/>
      <text x="1183" y="23" text-anchor="middle" fill="#ccfbf1" font-size="13" font-weight="800" letter-spacing="1.6">PERSIST</text>
    </g>

    <g filter="url(#shadow)">
      <rect x="72" y="222" width="186" height="452" rx="28" fill="#0f172a" stroke="#334155"/>
      <text x="104" y="272" font-size="28" font-weight="800" fill="#f8fafc">Signals</text>

      <g transform="translate(104,304)">
        <rect x="0" y="0" width="122" height="38" rx="18" fill="#111c30" stroke="#334155"/>
        <text x="61" y="24" text-anchor="middle" fill="#e2e8f0" font-size="16" font-weight="700">Cloud APIs</text>
        <rect x="0" y="54" width="122" height="38" rx="18" fill="#111c30" stroke="#334155"/>
        <text x="61" y="78" text-anchor="middle" fill="#e2e8f0" font-size="16" font-weight="700">Raw logs</text>
        <rect x="0" y="108" width="122" height="38" rx="18" fill="#111c30" stroke="#334155"/>
        <text x="61" y="132" text-anchor="middle" fill="#e2e8f0" font-size="16" font-weight="700">Identity</text>
        <rect x="0" y="162" width="122" height="38" rx="18" fill="#111c30" stroke="#334155"/>
        <text x="61" y="186" text-anchor="middle" fill="#e2e8f0" font-size="16" font-weight="700">Warehouses</text>
      </g>

      <text x="104" y="562" font-size="15" fill="#94a3b8">AWS, GCP, Azure, K8s, Okta, Entra,</text>
      <text x="104" y="586" font-size="15" fill="#94a3b8">Workspace, Snowflake, Databricks,</text>
      <text x="104" y="610" font-size="15" fill="#94a3b8">S3 Select, ClickHouse, and MCP inputs.</text>
    </g>

    <g filter="url(#shadow)">
      <rect x="318" y="222" width="220" height="196" rx="28" fill="#112244" stroke="#60a5fa"/>
      <text x="350" y="270" font-size="19" font-weight="800" fill="#dbeafe">L1 Ingest</text>
      <text x="350" y="336" font-size="56" font-weight="900" fill="#ffffff">15 + 3</text>
      <text x="350" y="370" font-size="18" fill="#bfdbfe">normalizes raw sources into OCSF</text>
      <text x="350" y="396" font-size="18" fill="#bfdbfe">or repo-native JSONL</text>

      <rect x="318" y="446" width="220" height="196" rx="28" fill="#112244" stroke="#60a5fa"/>
      <text x="350" y="494" font-size="19" font-weight="800" fill="#dbeafe">L2 Discover</text>
      <text x="350" y="560" font-size="56" font-weight="900" fill="#ffffff">4</text>
      <text x="350" y="594" font-size="18" fill="#bfdbfe">inventory, graph, AI BOM, and</text>
      <text x="350" y="620" font-size="18" fill="#bfdbfe">evidence collection live here</text>
    </g>

    <g filter="url(#shadow)">
      <rect x="590" y="222" width="220" height="196" rx="28" fill="#10342e" stroke="#2dd4bf"/>
      <text x="622" y="270" font-size="19" font-weight="800" fill="#d1fae5">L3 Detect</text>
      <text x="622" y="336" font-size="56" font-weight="900" fill="#ffffff">12</text>
      <text x="622" y="370" font-size="18" fill="#99f6e4">deterministic MITRE-tagged</text>
      <text x="622" y="396" font-size="18" fill="#99f6e4">OCSF finding producers</text>

      <rect x="590" y="446" width="220" height="196" rx="28" fill="#10342e" stroke="#2dd4bf"/>
      <text x="622" y="494" font-size="19" font-weight="800" fill="#d1fae5">L4 Evaluate</text>
      <text x="622" y="560" font-size="56" font-weight="900" fill="#ffffff">7</text>
      <text x="622" y="594" font-size="18" fill="#99f6e4">82 CIS, Kubernetes, container,</text>
      <text x="622" y="620" font-size="18" fill="#99f6e4">and AI security checks</text>
    </g>

    <g filter="url(#shadow)">
      <rect x="862" y="222" width="220" height="196" rx="28" fill="#3c2407" stroke="#f59e0b"/>
      <text x="894" y="270" font-size="19" font-weight="800" fill="#fde68a">L5 Remediate</text>
      <text x="894" y="336" font-size="56" font-weight="900" fill="#ffffff">8</text>
      <text x="894" y="370" font-size="18" fill="#fcd34d">HITL-gated, dry-run-first,</text>
      <text x="894" y="396" font-size="18" fill="#fcd34d">dual-audited write paths</text>

      <rect x="862" y="446" width="220" height="196" rx="28" fill="#3c2407" stroke="#f59e0b"/>
      <text x="894" y="494" font-size="19" font-weight="800" fill="#fde68a">L6 View</text>
      <text x="894" y="560" font-size="56" font-weight="900" fill="#ffffff">2</text>
      <text x="894" y="594" font-size="18" fill="#fcd34d">render OCSF into SARIF or</text>
      <text x="894" y="620" font-size="18" fill="#fcd34d">Mermaid for human review</text>
    </g>

    <g filter="url(#shadow)">
      <rect x="1134" y="222" width="194" height="420" rx="28" fill="#0a3130" stroke="#2dd4bf"/>
      <text x="1166" y="270" font-size="19" font-weight="800" fill="#ccfbf1">L7 Output</text>
      <text x="1166" y="336" font-size="56" font-weight="900" fill="#ffffff">3</text>
      <text x="1166" y="370" font-size="18" fill="#99f6e4">append-only sinks</text>
      <text x="1166" y="440" font-size="20" font-weight="700" fill="#f0fdfa">S3</text>
      <text x="1166" y="476" font-size="20" font-weight="700" fill="#f0fdfa">Snowflake</text>
      <text x="1166" y="512" font-size="20" font-weight="700" fill="#f0fdfa">ClickHouse</text>
      <text x="1166" y="570" font-size="17" fill="#99f6e4">Audit trails and ingest-back stay</text>
      <text x="1166" y="596" font-size="17" fill="#99f6e4">with the producer-owned flow.</text>
    </g>

    <path d="M258 448H296" stroke="#7dd3fc" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
    <path d="M538 320H566" stroke="#7dd3fc" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
    <path d="M538 544H566" stroke="#7dd3fc" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
    <path d="M810 320H838" stroke="#7dd3fc" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
    <path d="M810 544H838" stroke="#7dd3fc" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
    <path d="M1082 432H1110" stroke="#7dd3fc" stroke-width="4" fill="none" marker-end="url(#arrow)"/>

    <rect x="72" y="718" width="1256" height="68" rx="22" fill="#091120" stroke="#334155"/>
    <text x="104" y="752" font-size="17" font-weight="800" fill="#e2e8f0">Wire contract</text>
    <text x="104" y="778" font-size="17" fill="#cbd5e1">OCSF 1.8 where interop matters, native where state and audit matter more, rendered output on view, pass-through on sinks.</text>
  </g>
</svg>
