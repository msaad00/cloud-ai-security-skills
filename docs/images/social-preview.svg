<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">Quiver &#8212; agent-safe cloud and AI security skills</title>
  <desc id="desc">Social preview card: three-arrow logo mark, Quiver wordmark, tagline, and stat pills for 131 skills, OCSF 1.8, MCP-audited calls, and HITL dual-audited writes.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#060b17"/>
      <stop offset="100%" stop-color="#0a1325"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#1e3a8a" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#1e3a8a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="wordmark" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#93c5fd"/>
      <stop offset="50%" stop-color="#a7f3d0"/>
      <stop offset="100%" stop-color="#c4b5fd"/>
    </linearGradient>
    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#1e293b" stroke-opacity="0.25" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#grid)"/>
  <rect width="1280" height="640" fill="url(#glow)"/>

  <g font-family="Inter, Segoe UI, ui-sans-serif, Arial, sans-serif">
    <!-- Logo mark: three staggered arrows over a holder strip -->
    <g transform="translate(300,150) scale(1.9)">
      <path d="M10 8 L16 17 L12.5 17 L12.5 34 L7.5 34 L7.5 17 L4 17 Z" fill="#5eead4"/>
      <path d="M24 2 L31 13 L26.5 13 L26.5 36 L21.5 36 L21.5 13 L17 13 Z" fill="#93c5fd"/>
      <path d="M38 8 L44 17 L40.5 17 L40.5 34 L35.5 34 L35.5 17 L32 17 Z" fill="#c4b5fd"/>
      <rect x="2" y="42" width="44" height="4" rx="2" fill="#334155"/>
    </g>

    <text x="420" y="228" font-size="96" font-weight="900" fill="url(#wordmark)">Quiver</text>

    <text x="640" y="310" text-anchor="middle" fill="#e5eefb" font-size="28" font-weight="700">Agent-safe cloud &amp; AI security skills</text>
    <text x="640" y="352" text-anchor="middle" fill="#94a3b8" font-size="19">131 single-purpose arrows an agent draws one at a time &#8212; precise, tested, audited.</text>

    <!-- Stat pills -->
    <g transform="translate(214,410)">
      <g>
        <rect x="0" y="0" width="196" height="52" rx="26" fill="#0b1628" stroke="#22314d"/>
        <text x="98" y="33" text-anchor="middle" fill="#93c5fd" font-size="18" font-weight="800">131 skills</text>
      </g>
      <g transform="translate(216,0)">
        <rect x="0" y="0" width="196" height="52" rx="26" fill="#0b1628" stroke="#22314d"/>
        <text x="98" y="33" text-anchor="middle" fill="#67e8f9" font-size="18" font-weight="800">OCSF 1.8</text>
      </g>
      <g transform="translate(432,0)">
        <rect x="0" y="0" width="196" height="52" rx="26" fill="#0b1628" stroke="#22314d"/>
        <text x="98" y="33" text-anchor="middle" fill="#c4b5fd" font-size="18" font-weight="800">MCP-audited</text>
      </g>
      <g transform="translate(648,0)">
        <rect x="0" y="0" width="204" height="52" rx="26" fill="#0b1628" stroke="#22314d"/>
        <text x="102" y="33" text-anchor="middle" fill="#86efac" font-size="18" font-weight="800">HITL writes</text>
      </g>
    </g>

    <text x="640" y="540" text-anchor="middle" fill="#64748b" font-size="16" font-weight="700" letter-spacing="1.2">github.com/msaad00/quiver &#183; Apache 2.0</text>
  </g>
</svg>
