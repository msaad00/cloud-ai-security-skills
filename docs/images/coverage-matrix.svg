      <text x="28" y="14" fill="#fee2e2">missing (no issue yet)</text>
    </g>
    <g transform="translate(680,0)">
      <rect x="0" y="0" width="18" height="18" rx="4" fill="#1e3a8a" stroke="#3b82f6"/>
      <text x="28" y="14" fill="#dbeafe">posture-only</text>
