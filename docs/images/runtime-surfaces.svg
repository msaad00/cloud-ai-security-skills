<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="700" viewBox="0 0 1400 700" role="img" aria-labelledby="runtime-title runtime-desc">
  <title id="runtime-title">cloud-ai-security-skills runtime surfaces</title>
  <desc id="runtime-desc">Runtime architecture for cloud-ai-security-skills. MCP clients reach the repo MCP server over stdio, while CLI, CI, and cloud runners invoke the same shared skill bundle directly. The bundle emits native records, OCSF, review formats, evidence, and audited action trails. The key message is that no surface reimplements the skills.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#081122"/>
      <stop offset="100%" stop-color="#0f1a33"/>
    </linearGradient>
    <radialGradient id="glowA" cx="18%" cy="18%" r="60%">
      <stop offset="0%" stop-color="#c084fc" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#c084fc" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="84%" cy="26%" r="50%">
      <stop offset="0%" stop-color="#14b8a6" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#14b8a6" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" x="0" y="0" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M36 0H0V36" fill="none" stroke="#1f2a44" stroke-opacity="0.36" stroke-width="1"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#020617" flood-opacity="0.42"/>
    </filter>
    <marker id="arrowPurple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0L10 5L0 10z" fill="#c084fc"/>
    </marker>
    <marker id="arrowTeal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0L10 5L0 10z" fill="#2dd4bf"/>
    </marker>
  </defs>

  <rect width="1400" height="700" fill="url(#bg)"/>
  <rect width="1400" height="700" fill="url(#grid)"/>
  <rect width="1400" height="700" fill="url(#glowA)"/>
  <rect width="1400" height="700" fill="url(#glowB)"/>

  <g font-family="Inter, Arial, sans-serif">
    <text x="72" y="82" font-size="42" font-weight="900" fill="#f8fafc">Runtime surfaces: one shared bundle, four real entry paths</text>
    <text x="72" y="118" font-size="18" fill="#cbd5e1">MCP adds transport and audited tool control. CLI, CI, and cloud runners still invoke the exact same skill code.</text>

    <g filter="url(#shadow)">
      <rect x="72" y="178" width="272" height="134" rx="28" fill="#2c1a57" stroke="#a78bfa"/>
      <text x="104" y="228" font-size="24" font-weight="800" fill="#f5f3ff">MCP clients</text>
      <text x="104" y="260" font-size="18" fill="#ddd6fe">Claude, Codex, Cursor, Windsurf,</text>
      <text x="104" y="286" font-size="18" fill="#ddd6fe">Zed, Continue, and other IDE agents</text>

      <rect x="72" y="350" width="272" height="92" rx="24" fill="#123b5f" stroke="#38bdf8"/>
      <text x="104" y="390" font-size="24" font-weight="800" fill="#e0f2fe">CLI and CI</text>
      <text x="104" y="420" font-size="18" fill="#bae6fd">stdin/stdout pipes and GitHub Actions</text>

      <rect x="72" y="480" width="272" height="92" rx="24" fill="#12443f" stroke="#2dd4bf"/>
      <text x="104" y="520" font-size="24" font-weight="800" fill="#ccfbf1">Cloud runners</text>
      <text x="104" y="550" font-size="18" fill="#99f6e4">S3 + SQS, GCS + PubSub, Blob + EventGrid</text>
    </g>

    <g filter="url(#shadow)">
      <rect x="404" y="178" width="286" height="186" rx="30" fill="#4a114f" stroke="#e879f9"/>
      <text x="438" y="230" font-size="26" font-weight="800" fill="#fae8ff">Repo MCP server</text>
      <text x="438" y="272" font-size="18" fill="#f5d0fe">auto-discovers `SKILL.md`</text>
      <text x="438" y="302" font-size="18" fill="#f5d0fe">audits tool calls and timeouts</text>
      <text x="438" y="332" font-size="18" fill="#f5d0fe">applies allowlist and wrapper policy</text>

      <rect x="404" y="418" width="286" height="154" rx="30" fill="#0f172a" stroke="#64748b"/>
      <text x="438" y="468" font-size="24" font-weight="800" fill="#f8fafc">Surface contract</text>
      <text x="438" y="500" font-size="18" fill="#cbd5e1">No surface reimplements the skills.</text>
      <text x="438" y="528" font-size="18" fill="#cbd5e1">Transport changes, execution core stays the same.</text>
    </g>

    <g filter="url(#shadow)">
      <rect x="754" y="148" width="366" height="454" rx="34" fill="#0b4a44" stroke="#2dd4bf"/>
      <text x="798" y="214" font-size="30" font-weight="900" fill="#ecfeff">Shared skill bundle</text>
      <text x="798" y="304" font-size="86" font-weight="900" fill="#ffffff">54</text>
      <text x="914" y="304" font-size="42" font-weight="800" fill="#ffffff">skills</text>
      <text x="798" y="352" font-size="23" fill="#99f6e4">`SKILL.md + src/ + tests/`</text>

      <rect x="798" y="396" width="278" height="146" rx="22" fill="#08302d" stroke="#2dd4bf"/>
      <text x="822" y="434" font-size="16" font-weight="800" fill="#ccfbf1" letter-spacing="1.1">SHARED GUARANTEES</text>
      <text x="822" y="468" font-size="18" fill="#e6fffb">same audit behavior</text>
      <text x="822" y="496" font-size="18" fill="#e6fffb">same HITL gates</text>
      <text x="822" y="524" font-size="18" fill="#e6fffb">same dry-run and schema contracts</text>
    </g>

    <g filter="url(#shadow)">
      <rect x="1184" y="178" width="152" height="394" rx="28" fill="#3c2407" stroke="#f59e0b"/>
      <text x="1216" y="226" font-size="24" font-weight="800" fill="#fef3c7">Outputs</text>
      <text x="1216" y="278" font-size="18" fill="#fde68a">native JSONL</text>
      <text x="1216" y="316" font-size="18" fill="#fde68a">OCSF 1.8</text>
      <text x="1216" y="354" font-size="18" fill="#fde68a">SARIF</text>
      <text x="1216" y="392" font-size="18" fill="#fde68a">Mermaid</text>
      <text x="1216" y="430" font-size="18" fill="#fde68a">BOM / evidence</text>
      <text x="1216" y="468" font-size="18" fill="#fde68a">audited actions</text>
    </g>

    <path d="M344 246H386" stroke="#c084fc" stroke-width="4" fill="none" marker-end="url(#arrowPurple)"/>
    <path d="M344 396H724" stroke="#38bdf8" stroke-width="4" fill="none" marker-end="url(#arrowTeal)"/>
    <path d="M344 526H724" stroke="#2dd4bf" stroke-width="4" fill="none" marker-end="url(#arrowTeal)"/>
    <path d="M690 270H724" stroke="#c084fc" stroke-width="4" fill="none" marker-end="url(#arrowPurple)"/>
    <path d="M690 494H724" stroke="#94a3b8" stroke-width="4" fill="none" marker-end="url(#arrowTeal)"/>
    <path d="M1120 376H1160" stroke="#2dd4bf" stroke-width="4" fill="none" marker-end="url(#arrowTeal)"/>

    <text x="358" y="232" font-size="14" font-weight="800" fill="#c4b5fd">stdio</text>
    <text x="520" y="382" font-size="14" font-weight="800" fill="#7dd3fc">direct invoke</text>
    <text x="520" y="512" font-size="14" font-weight="800" fill="#99f6e4">event-driven invoke</text>
  </g>
</svg>
