<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="860" viewBox="0 0 1280 860" role="img" aria-labelledby="title desc">
  <title id="title">IAM departures remediation - AWS flagship workflow</title>
  <desc id="desc">Cleaned AWS-only IAM departures workflow aligned to the shipped skill. One HR source, such as Snowflake, Workday, Databricks, or ClickHouse, feeds the reconciler. The reconciler applies should_remediate(), rehire checks, grace-window filtering, and hash-diff gating before writing only actionable rows to a KMS-encrypted S3 manifest. S3 ObjectCreated triggers EventBridge, which starts a Step Function. The Step Function runs ParseManifest through the parser Lambda, then either exits with no action or maps one worker execution per validated entry, with max concurrency ten. The worker Lambda assumes a cross-account role guarded by aws:PrincipalOrgID, runs eleven worker functions that correspond to thirteen IAM API operations, and only touches AWS IAM in member accounts. The shipped audit path dual-writes to DynamoDB and KMS-encrypted S3; warehouse ingest-back is shown as an optional verification path that feeds the next reconciler run. Azure Entra and GCP IAM keep separate native pipelines, so one worker never crosses cloud boundaries.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07111f"/>
      <stop offset="100%" stop-color="#0d1b31"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#13213c"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="headline" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e0f2fe"/>
      <stop offset="55%" stop-color="#bfdbfe"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
    <pattern id="grid" x="0" y="0" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M36 0H0V36" fill="none" stroke="#1e293b" stroke-opacity="0.35" stroke-width="1"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#020617" flood-opacity="0.38"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#94a3b8"/>
    </marker>
    <marker id="arrowWarm" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#f59e0b"/>
    </marker>
    <marker id="arrowSink" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#2dd4bf"/>
    </marker>
    <marker id="arrowLoop" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#ec4899"/>
    </marker>
  </defs>

  <rect width="1280" height="860" fill="url(#bg)"/>
  <rect width="1280" height="860" fill="url(#grid)"/>

  <g font-family="Segoe UI, ui-sans-serif, Arial, sans-serif">
    <g transform="translate(56,38)">
      <rect x="0" y="0" width="224" height="34" rx="17" fill="#221306" stroke="#f59e0b"/>
      <text x="18" y="22" fill="#fbbf24" font-size="12" font-weight="800" letter-spacing="1.5">AWS FLAGSHIP WORKFLOW</text>
    </g>

    <text x="56" y="108" fill="url(#headline)" font-size="38" font-weight="900" letter-spacing="-0.7">IAM departures remediation</text>
    <text x="56" y="138" fill="#cbd5e1" font-size="15">Guarded, event-driven, dual-audited - and one cloud per worker, never cross-cloud.</text>

    <g>
      <rect x="56" y="160" width="1168" height="42" rx="21" fill="#0b1730" stroke="#475569"/>
      <text x="78" y="186" fill="#e2e8f0" font-size="13" font-weight="800">DepartureRecord</text>
      <g font-size="12" font-weight="700">
        <rect x="212" y="169" width="124" height="22" rx="11" fill="#0d2539" stroke="#38bdf8"/>
        <text x="274" y="184" text-anchor="middle" fill="#bae6fd">terminated_at</text>
        <rect x="346" y="169" width="82" height="22" rx="11" fill="#0d2539" stroke="#38bdf8"/>
        <text x="387" y="184" text-anchor="middle" fill="#bae6fd">email</text>
        <rect x="438" y="169" width="132" height="22" rx="11" fill="#0d2539" stroke="#38bdf8"/>
        <text x="504" y="184" text-anchor="middle" fill="#bae6fd">iam_username</text>
        <rect x="580" y="169" width="182" height="22" rx="11" fill="#0d2539" stroke="#38bdf8"/>
        <text x="671" y="184" text-anchor="middle" fill="#bae6fd">recipient_account_id</text>
      </g>
      <text x="780" y="186" fill="#64748b" font-size="11">rehire, deletion, and hash metadata travel alongside the core record</text>
    </g>

    <g stroke="#38bdf8" stroke-width="1.6" stroke-dasharray="8 6" fill="none">
      <rect x="56" y="224" width="1168" height="312" rx="18"/>
    </g>
    <text x="74" y="248" fill="#7dd3fc" font-size="12" font-weight="800" letter-spacing="1.3">SHIPPED AWS CONTROL PLANE</text>
    <text x="1014" y="248" fill="#64748b" font-size="11">separate roles at every hop</text>

    <g filter="url(#shadow)">
      <rect x="56" y="264" width="170" height="238" rx="16" fill="url(#panel)" stroke="#38bdf8" stroke-width="1.4"/>
      <rect x="72" y="280" width="36" height="24" rx="12" fill="#082f49" stroke="#38bdf8"/>
      <text x="90" y="296" text-anchor="middle" fill="#7dd3fc" font-size="12" font-weight="800">1</text>
      <text x="120" y="296" fill="#e0f2fe" font-size="15" font-weight="800">Sources</text>
      <text x="72" y="320" fill="#94a3b8" font-size="11">Pick one source.</text>

      <rect x="72" y="340" width="138" height="34" rx="10" fill="#0f1a2f" stroke="#7dd3fc"/>
      <text x="141" y="361" text-anchor="middle" fill="#e0f2fe" font-size="12" font-weight="800">Snowflake</text>
      <rect x="72" y="384" width="138" height="34" rx="10" fill="#0f1a2f" stroke="#fb923c"/>
      <text x="141" y="405" text-anchor="middle" fill="#ffedd5" font-size="12" font-weight="800">Workday</text>
      <rect x="72" y="428" width="138" height="34" rx="10" fill="#0f1a2f" stroke="#fb923c"/>
      <text x="141" y="449" text-anchor="middle" fill="#ffedd5" font-size="12" font-weight="800">Databricks</text>
      <rect x="72" y="472" width="138" height="34" rx="10" fill="#0f1a2f" stroke="#facc15"/>
      <text x="141" y="493" text-anchor="middle" fill="#fef9c3" font-size="12" font-weight="800">ClickHouse</text>
    </g>

    <g filter="url(#shadow)">
      <rect x="240" y="264" width="188" height="238" rx="16" fill="url(#panel)" stroke="#f59e0b" stroke-width="1.4"/>
      <rect x="256" y="280" width="36" height="24" rx="12" fill="#3b2207" stroke="#f59e0b"/>
      <text x="274" y="296" text-anchor="middle" fill="#fbbf24" font-size="12" font-weight="800">2</text>
      <text x="304" y="296" fill="#fef3c7" font-size="15" font-weight="800">Reconciler</text>
      <text x="256" y="320" fill="#94a3b8" font-size="11">Scope first.</text>

      <rect x="256" y="338" width="156" height="108" rx="12" fill="#0f1a2f" stroke="#fbbf24"/>
      <text x="334" y="360" text-anchor="middle" fill="#fef3c7" font-size="13" font-weight="800">should_remediate()</text>
      <text x="270" y="384" fill="#cbd5e1" font-size="11">- rehire-aware filter</text>
      <text x="270" y="402" fill="#cbd5e1" font-size="11">- 7d grace window by default</text>
      <text x="270" y="420" fill="#cbd5e1" font-size="11">- SHA-256 diff; no change, no run</text>

      <rect x="256" y="462" width="156" height="28" rx="14" fill="#241607" stroke="#f59e0b"/>
      <text x="334" y="480" text-anchor="middle" fill="#fde68a" font-size="11" font-weight="700">actionable rows only</text>
    </g>

    <g filter="url(#shadow)">
      <rect x="442" y="264" width="166" height="238" rx="16" fill="url(#panel)" stroke="#34d399" stroke-width="1.4"/>
      <rect x="458" y="280" width="36" height="24" rx="12" fill="#0c2c23" stroke="#34d399"/>
      <text x="476" y="296" text-anchor="middle" fill="#6ee7b7" font-size="12" font-weight="800">3</text>
      <text x="506" y="296" fill="#d1fae5" font-size="15" font-weight="800">S3 manifest</text>
      <text x="458" y="320" fill="#94a3b8" font-size="11">Manifest, audit prefix, hash state.</text>

      <rect x="458" y="342" width="134" height="34" rx="10" fill="#0f1a2f" stroke="#34d399"/>
      <text x="525" y="363" text-anchor="middle" fill="#d1fae5" font-size="11" font-weight="800">departures/DATE.json</text>
      <rect x="458" y="386" width="134" height="34" rx="10" fill="#0f1a2f" stroke="#2dd4bf"/>
      <text x="525" y="407" text-anchor="middle" fill="#ccfbf1" font-size="11" font-weight="800">departures/audit/*</text>
      <rect x="458" y="430" width="134" height="34" rx="10" fill="#0f1a2f" stroke="#60a5fa"/>
      <text x="525" y="451" text-anchor="middle" fill="#dbeafe" font-size="11" font-weight="800">departures/.last_hash</text>
      <text x="458" y="485" fill="#cbd5e1" font-size="10">EventBridge notifications enabled on the bucket.</text>
    </g>

    <g filter="url(#shadow)">
      <rect x="622" y="264" width="220" height="238" rx="16" fill="url(#panel)" stroke="#ec4899" stroke-width="1.4"/>
      <rect x="638" y="280" width="36" height="24" rx="12" fill="#3b0a2a" stroke="#ec4899"/>
      <text x="656" y="296" text-anchor="middle" fill="#f9a8d4" font-size="12" font-weight="800">4</text>
      <text x="686" y="296" fill="#fbcfe8" font-size="15" font-weight="800">EventBridge / StepFn</text>
      <text x="638" y="320" fill="#94a3b8" font-size="11">Shipped S3 ObjectCreated entrypoint.</text>

      <rect x="638" y="338" width="188" height="32" rx="10" fill="#0f1a2f" stroke="#f472b6"/>
      <text x="732" y="359" text-anchor="middle" fill="#fbcfe8" font-size="11" font-weight="800">EventBridge starts the state machine</text>

      <rect x="638" y="384" width="188" height="98" rx="12" fill="#0f1a2f" stroke="#f9a8d4"/>
      <text x="652" y="406" fill="#fbcfe8" font-size="12" font-weight="800">ParseManifest via parser Lambda</text>
      <text x="652" y="424" fill="#cbd5e1" font-size="11">- read manifest and required fields</text>
      <text x="652" y="442" fill="#cbd5e1" font-size="11">- recheck grace, rehire, and deleted state</text>
      <text x="652" y="460" fill="#cbd5e1" font-size="11">- AssumeRole + iam:GetUser verification</text>

      <rect x="638" y="492" width="188" height="26" rx="13" fill="#3b0a2a" stroke="#ec4899"/>
      <text x="732" y="509" text-anchor="middle" fill="#f9a8d4" font-size="11" font-weight="700">Choice: no action or Map max 10 concurrent</text>
    </g>

    <g filter="url(#shadow)">
      <rect x="856" y="264" width="184" height="238" rx="16" fill="url(#panel)" stroke="#fbbf24" stroke-width="1.4"/>
      <rect x="872" y="280" width="36" height="24" rx="12" fill="#3b2207" stroke="#fbbf24"/>
      <text x="890" y="296" text-anchor="middle" fill="#fcd34d" font-size="12" font-weight="800">5</text>
      <text x="920" y="296" fill="#fef3c7" font-size="15" font-weight="800">Worker Lambda</text>
      <text x="872" y="320" fill="#94a3b8" font-size="11">AWS-only write path.</text>

      <rect x="872" y="340" width="152" height="28" rx="14" fill="#241607" stroke="#f59e0b"/>
      <text x="948" y="358" text-anchor="middle" fill="#fde68a" font-size="11" font-weight="700">AssumeRole - iam-remediation-role</text>
      <text x="872" y="386" fill="#cbd5e1" font-size="11">- aws:PrincipalOrgID guardrail</text>
      <text x="872" y="404" fill="#cbd5e1" font-size="11">- replay-safe checkpoint in DynamoDB</text>
      <text x="872" y="422" fill="#cbd5e1" font-size="11">- protected principals refused first</text>
      <text x="872" y="440" fill="#cbd5e1" font-size="11">- 11 worker functions</text>
      <text x="872" y="458" fill="#cbd5e1" font-size="11">- 13 IAM API ops in CloudTrail terms</text>
      <rect x="872" y="474" width="152" height="22" rx="11" fill="#0f1a2f" stroke="#fbbf24"/>
      <text x="948" y="489" text-anchor="middle" fill="#fef3c7" font-size="10" font-weight="700">never calls Azure or GCP APIs</text>
    </g>

    <g filter="url(#shadow)">
      <rect x="1054" y="264" width="170" height="238" rx="16" fill="url(#panel)" stroke="#f87171" stroke-width="1.4"/>
      <rect x="1070" y="280" width="36" height="24" rx="12" fill="#3f1d1d" stroke="#f87171"/>
      <text x="1088" y="296" text-anchor="middle" fill="#fca5a5" font-size="12" font-weight="800">6</text>
      <text x="1118" y="296" fill="#fee2e2" font-size="15" font-weight="800">AWS target accounts</text>
      <text x="1070" y="320" fill="#94a3b8" font-size="11">Member accounts inside the AWS Org.</text>

      <text x="1070" y="350" fill="#fee2e2" font-size="11" font-weight="800">1. Keys: deactivate, then delete</text>
      <text x="1070" y="372" fill="#fee2e2" font-size="11" font-weight="800">2. Console, groups, policies cleanup</text>
      <text x="1070" y="394" fill="#fee2e2" font-size="11" font-weight="800">3. MFA, certs, SSH, service creds</text>
      <text x="1070" y="416" fill="#fee2e2" font-size="11" font-weight="800">4. Tag user with audit metadata</text>
      <text x="1070" y="438" fill="#fee2e2" font-size="11" font-weight="800">5. Delete IAM user last</text>
      <rect x="1070" y="462" width="138" height="24" rx="12" fill="#3f1d1d" stroke="#f87171"/>
      <text x="1139" y="478" text-anchor="middle" fill="#fecaca" font-size="10" font-weight="700">strict order or DeleteUser fails</text>
    </g>

    <path d="M226,383 L240,383" fill="none" stroke="#94a3b8" stroke-width="2.2" marker-end="url(#arrow)"/>
    <path d="M428,383 L442,383" fill="none" stroke="#94a3b8" stroke-width="2.2" marker-end="url(#arrow)"/>
    <path d="M608,383 L622,383" fill="none" stroke="#94a3b8" stroke-width="2.2" marker-end="url(#arrow)"/>
    <path d="M842,383 L856,383" fill="none" stroke="#94a3b8" stroke-width="2.2" marker-end="url(#arrow)"/>
    <path d="M1040,383 L1054,383" fill="none" stroke="#f59e0b" stroke-width="2.4" marker-end="url(#arrowWarm)"/>

    <g stroke="#2dd4bf" stroke-width="1.6" stroke-dasharray="8 6" fill="none">
      <rect x="56" y="556" width="1168" height="244" rx="18"/>
    </g>
    <text x="74" y="580" fill="#5eead4" font-size="12" font-weight="800" letter-spacing="1.3">DUAL AUDIT + VERIFY</text>
    <text x="982" y="580" fill="#64748b" font-size="11">repo-owned audit: DynamoDB + KMS S3</text>

    <g filter="url(#shadow)">
      <rect x="86" y="602" width="328" height="156" rx="16" fill="url(#panel)" stroke="#60a5fa" stroke-width="1.4"/>
      <rect x="104" y="620" width="84" height="24" rx="12" fill="#10233d" stroke="#60a5fa"/>
      <text x="146" y="636" text-anchor="middle" fill="#bfdbfe" font-size="10" font-weight="800">SHIPPED</text>
      <text x="104" y="664" fill="#dbeafe" font-size="16" font-weight="800">DynamoDB audit + checkpoint</text>
      <text x="104" y="690" fill="#cbd5e1" font-size="11">- current status per account and IAM user</text>
      <text x="104" y="708" fill="#cbd5e1" font-size="11">- replay-safe progress for resumed executions</text>
      <text x="104" y="726" fill="#cbd5e1" font-size="11">- fast operational lookup for live remediation state</text>
    </g>

    <g filter="url(#shadow)">
      <rect x="476" y="602" width="328" height="156" rx="16" fill="url(#panel)" stroke="#34d399" stroke-width="1.4"/>
      <rect x="494" y="620" width="84" height="24" rx="12" fill="#0c2c23" stroke="#34d399"/>
      <text x="536" y="636" text-anchor="middle" fill="#bbf7d0" font-size="10" font-weight="800">SHIPPED</text>
      <text x="494" y="664" fill="#d1fae5" font-size="16" font-weight="800">KMS-encrypted S3 evidence</text>
      <text x="494" y="690" fill="#cbd5e1" font-size="11">- immutable JSON objects under departures/audit/</text>
      <text x="494" y="708" fill="#cbd5e1" font-size="11">- compliance archive and ingest source of truth</text>
      <text x="494" y="726" fill="#cbd5e1" font-size="11">- same bucket family as the manifest, separate prefix</text>
    </g>

    <g filter="url(#shadow)">
      <rect x="866" y="602" width="328" height="156" rx="16" fill="url(#panel)" stroke="#fb923c" stroke-width="1.4"/>
      <rect x="884" y="620" width="124" height="24" rx="12" fill="#241607" stroke="#fb923c"/>
      <text x="946" y="636" text-anchor="middle" fill="#fdba74" font-size="10" font-weight="800">OPTIONAL PATTERN</text>
      <text x="884" y="664" fill="#ffedd5" font-size="16" font-weight="800">Warehouse ingest-back + next run</text>
      <text x="884" y="690" fill="#cbd5e1" font-size="11">- Snowpipe, Auto Loader, or ClickHouse ETL</text>
      <text x="884" y="708" fill="#cbd5e1" font-size="11">- next reconciler sees remediated users and drift</text>
      <text x="884" y="726" fill="#cbd5e1" font-size="11">- verification loop, not a direct worker write sink</text>
    </g>

    <path d="M948,502 L948,560 L250,560 L250,602" fill="none" stroke="#60a5fa" stroke-width="2.2" marker-end="url(#arrow)"/>
    <path d="M948,502 L948,560 L640,560 L640,602" fill="none" stroke="#34d399" stroke-width="2.2" marker-end="url(#arrowSink)"/>
    <path d="M414,680 L476,680" fill="none" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
    <path d="M804,680 L866,680" fill="none" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
    <path d="M1030,602 L1030,544 L334,544 L334,502" fill="none" stroke="#ec4899" stroke-width="2.2" stroke-dasharray="8 6" marker-end="url(#arrowLoop)"/>

    <text x="910" y="534" fill="#5eead4" font-size="11" font-weight="700">dual write on every worker action</text>
    <text x="766" y="530" fill="#ec4899" font-size="11" font-weight="700">next reconciler run closes the loop</text>

    <text x="56" y="830" fill="#94a3b8" font-size="13">Azure Entra and GCP IAM keep the same guardrails but run in their own native pipelines. One worker principal never spans clouds.</text>
  </g>
</svg>
