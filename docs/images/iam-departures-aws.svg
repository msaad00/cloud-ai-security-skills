<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="820" viewBox="0 0 1280 820" role="img" aria-labelledby="title desc">
  <title id="title">IAM departures remediation · AWS flagship write path</title>
  <desc id="desc">Simplified AWS IAM departures remediation flow for the iam-departures-aws skill. Plan scopes the actionable set from HR sources through the reconciler into an immutable S3 manifest. Orchestrate uses EventBridge, Step Functions, a parser Lambda, and a worker Lambda. Write stays inside AWS IAM with an org-bounded cross-account role and an ordered teardown represented as 11 worker functions spanning 13 IAM API operations. Audit writes to DynamoDB and KMS-encrypted S3, then the next run verifies closure or drift. Azure and GCP are shown only as native-stack variants, not as shared workers.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07101f"/>
      <stop offset="100%" stop-color="#101935"/>
    </linearGradient>
    <radialGradient id="glowA" cx="18%" cy="12%" r="54%">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#2563eb" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="82%" cy="18%" r="42%">
      <stop offset="0%" stop-color="#14b8a6" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#14b8a6" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" x="0" y="0" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M36 0H0V36" fill="none" stroke="#1d2942" stroke-opacity="0.36" stroke-width="1"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#020617" flood-opacity="0.34"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0L10 5L0 10z" fill="#7dd3fc"/>
    </marker>
    <marker id="arrowAmber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0L10 5L0 10z" fill="#fbbf24"/>
    </marker>
    <marker id="arrowTeal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0L10 5L0 10z" fill="#2dd4bf"/>
    </marker>
  </defs>

  <rect width="1280" height="820" fill="url(#bg)"/>
  <rect width="1280" height="820" fill="url(#grid)"/>
  <rect width="1280" height="820" fill="url(#glowA)"/>
  <rect width="1280" height="820" fill="url(#glowB)"/>

  <g font-family="Inter, Arial, sans-serif">
    <g transform="translate(56,42)">
      <rect x="0" y="0" width="208" height="34" rx="17" fill="#2a1708" stroke="#f59e0b"/>
      <text x="18" y="22" fill="#fbbf24" font-size="11" font-weight="800" letter-spacing="1.5">AWS FLAGSHIP WRITE PATH</text>
    </g>

    <text x="56" y="122" font-size="40" font-weight="900" fill="#f8fafc">IAM departures remediation</text>
    <text x="56" y="154" font-size="17" fill="#cbd5e1">The shipped write skill, redrawn as one clean route: scope first, orchestrate per user, write inside AWS only, then dual-audit.</text>

    <g transform="translate(56,182)">
      <rect x="0" y="0" width="220" height="38" rx="19" fill="#0b1a2e" stroke="#60a5fa"/>
      <text x="20" y="25" fill="#bfdbfe" font-size="13" font-weight="800">skill/remediation/iam-departures-aws</text>
      <rect x="238" y="0" width="196" height="38" rx="19" fill="#102c29" stroke="#34d399"/>
      <text x="258" y="25" fill="#d1fae5" font-size="13" font-weight="800">one cloud per worker</text>
      <rect x="452" y="0" width="184" height="38" rx="19" fill="#161230" stroke="#a78bfa"/>
      <text x="472" y="25" fill="#ddd6fe" font-size="13" font-weight="800">checkpoint-safe order</text>
    </g>

    <g transform="translate(56,252)" font-size="12" font-weight="800" letter-spacing="1.4">
      <text x="0" y="0" fill="#22d3ee">① PLAN</text>
      <text x="300" y="0" fill="#60a5fa">② ORCHESTRATE</text>
      <text x="620" y="0" fill="#fbbf24">③ WRITE</text>
      <text x="974" y="0" fill="#2dd4bf">④ AUDIT</text>
    </g>
    <g transform="translate(56,272)" font-size="11" fill="#64748b">
      <text x="0" y="0">decide scope before any destructive path exists</text>
      <text x="300" y="0">native AWS orchestration, one execution per user</text>
      <text x="620" y="0">worker assumes org-bounded role and follows ordered teardown</text>
      <text x="974" y="0">write evidence twice and verify on the next run</text>
    </g>

    <g filter="url(#shadow)">
      <rect x="56" y="296" width="258" height="372" rx="28" fill="#0b1a2e" stroke="#22d3ee"/>
      <rect x="356" y="296" width="278" height="372" rx="28" fill="#0f1d36" stroke="#60a5fa"/>
      <rect x="676" y="296" width="320" height="372" rx="28" fill="#2a1708" stroke="#fbbf24"/>
      <rect x="1038" y="296" width="186" height="372" rx="28" fill="#0b3d3b" stroke="#2dd4bf"/>
    </g>

    <g transform="translate(80,330)">
      <rect x="0" y="0" width="210" height="68" rx="18" fill="#102338" stroke="#334155"/>
      <text x="18" y="28" fill="#e0f2fe" font-size="17" font-weight="800">HR sources</text>
      <text x="18" y="50" fill="#94a3b8" font-size="12">Snowflake · Databricks · HR-shaped rows</text>

      <path d="M105,78 L105,102" stroke="#7dd3fc" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

      <rect x="0" y="118" width="210" height="96" rx="18" fill="#102338" stroke="#334155"/>
      <text x="18" y="148" fill="#e0f2fe" font-size="17" font-weight="800">Reconciler</text>
      <text x="18" y="172" fill="#94a3b8" font-size="12">rehire-aware filter</text>
      <text x="18" y="190" fill="#94a3b8" font-size="12">grace window enforced</text>

      <path d="M105,224 L105,248" stroke="#7dd3fc" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

      <rect x="0" y="264" width="210" height="78" rx="18" fill="#102c29" stroke="#34d399"/>
      <text x="18" y="294" fill="#d1fae5" font-size="17" font-weight="800">S3 manifest</text>
      <text x="18" y="318" fill="#94a3b8" font-size="12">actionable users only</text>
      <text x="18" y="336" fill="#94a3b8" font-size="12">immutable handoff into orchestration</text>
    </g>

    <path d="M314 506H342" stroke="#7dd3fc" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
    <text x="328" y="490" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="800">S3 ObjectCreated</text>

    <g transform="translate(380,330)">
      <rect x="0" y="0" width="230" height="62" rx="18" fill="#152746" stroke="#60a5fa"/>
      <text x="18" y="27" fill="#dbeafe" font-size="17" font-weight="800">EventBridge rule</text>
      <text x="18" y="48" fill="#94a3b8" font-size="12">starts the state machine on manifest upload</text>

      <path d="M115,72 L115,96" stroke="#7dd3fc" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

      <rect x="0" y="110" width="230" height="78" rx="18" fill="#152746" stroke="#60a5fa"/>
      <text x="18" y="140" fill="#dbeafe" font-size="17" font-weight="800">Step Functions</text>
      <text x="18" y="164" fill="#94a3b8" font-size="12">Map state</text>
      <text x="18" y="182" fill="#94a3b8" font-size="12">one execution per user</text>

      <path d="M115,198 L115,222" stroke="#7dd3fc" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

      <rect x="0" y="236" width="230" height="62" rx="18" fill="#321d09" stroke="#fbbf24"/>
      <text x="18" y="263" fill="#fef3c7" font-size="17" font-weight="800">Parser Lambda</text>
      <text x="18" y="284" fill="#94a3b8" font-size="12">re-check manifest and live IAM state</text>

      <path d="M115,308 L115,332" stroke="#7dd3fc" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

      <rect x="0" y="346" width="230" height="62" rx="18" fill="#321d09" stroke="#fbbf24"/>
      <text x="18" y="373" fill="#fef3c7" font-size="17" font-weight="800">Worker Lambda</text>
      <text x="18" y="394" fill="#94a3b8" font-size="12">checkpoint-safe write execution</text>
    </g>

    <path d="M634 538H662" stroke="#fbbf24" stroke-width="4" fill="none" marker-end="url(#arrowAmber)"/>
    <text x="648" y="522" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="800">AssumeRole</text>

    <g transform="translate(700,330)">
      <rect x="0" y="0" width="272" height="86" rx="18" fill="#321d09" stroke="#fbbf24"/>
      <text x="18" y="28" fill="#fef3c7" font-size="17" font-weight="800">AWS IAM write scope</text>
      <text x="18" y="52" fill="#94a3b8" font-size="12">org-bounded cross-account role</text>
      <text x="18" y="70" fill="#94a3b8" font-size="12">`aws:PrincipalOrgID` guard + per-user checkpoint flow</text>

      <rect x="0" y="110" width="272" height="222" rx="18" fill="#161230" stroke="#a78bfa"/>
      <text x="18" y="138" fill="#ddd6fe" font-size="13" font-weight="800" letter-spacing="1.1">ORDERED TEARDOWN</text>
      <text x="18" y="164" fill="#ede9fe" font-size="13">Access keys → inactive, then deleted</text>
      <text x="18" y="186" fill="#ede9fe" font-size="13">Console login profile removed</text>
      <text x="18" y="208" fill="#ede9fe" font-size="13">Group memberships removed</text>
      <text x="18" y="230" fill="#ede9fe" font-size="13">Managed + inline policies detached or deleted</text>
      <text x="18" y="252" fill="#ede9fe" font-size="13">MFA devices, signing certs, SSH keys cleared</text>
      <text x="18" y="274" fill="#ede9fe" font-size="13">Service credentials removed</text>
      <text x="18" y="296" fill="#ede9fe" font-size="13">User tagged for audit</text>
      <text x="18" y="318" fill="#f3e8ff" font-size="13" font-weight="900">IAM user deleted last</text>

      <rect x="18" y="346" width="236" height="52" rx="14" fill="#1f1b45" stroke="#c4b5fd"/>
      <text x="36" y="368" fill="#ddd6fe" font-size="12" font-weight="800">code truth</text>
      <text x="36" y="388" fill="#cbd5e1" font-size="12">11 worker functions · 13 IAM API operations</text>
    </g>

    <path d="M996 538H1024" stroke="#2dd4bf" stroke-width="4" fill="none" marker-end="url(#arrowTeal)"/>
    <text x="1010" y="522" text-anchor="middle" fill="#2dd4bf" font-size="11" font-weight="800">audit</text>

    <g transform="translate(1062,330)">
      <rect x="0" y="0" width="138" height="74" rx="18" fill="#10342e" stroke="#2dd4bf"/>
      <text x="18" y="28" fill="#ccfbf1" font-size="16" font-weight="800">DynamoDB</text>
      <text x="18" y="50" fill="#94a3b8" font-size="12">fast lookup</text>
      <text x="18" y="66" fill="#94a3b8" font-size="12">user + ts keyed</text>

      <path d="M69,84 L69,108" stroke="#7dd3fc" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

      <rect x="0" y="122" width="138" height="88" rx="18" fill="#10342e" stroke="#2dd4bf"/>
      <text x="18" y="150" fill="#ccfbf1" font-size="16" font-weight="800">S3 + KMS</text>
      <text x="18" y="174" fill="#94a3b8" font-size="12">immutable JSON</text>
      <text x="18" y="192" fill="#94a3b8" font-size="12">long-retention evidence</text>

      <path d="M69,220 L69,244" stroke="#7dd3fc" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

      <rect x="0" y="258" width="138" height="84" rx="18" fill="#10342e" stroke="#2dd4bf"/>
      <text x="18" y="286" fill="#ccfbf1" font-size="16" font-weight="800">Reverify</text>
      <text x="18" y="310" fill="#94a3b8" font-size="12">next run checks</text>
      <text x="18" y="328" fill="#94a3b8" font-size="12">closure or drift</text>
    </g>

    <g transform="translate(56,702)">
      <rect x="0" y="0" width="1168" height="72" rx="18" fill="#091120" stroke="#475569"/>
      <text x="20" y="26" fill="#f1f5f9" font-size="13" font-weight="800">Native variations, not shared workers</text>
      <text x="20" y="48" fill="#94a3b8" font-size="12">AWS orchestration above is what ships today. Azure uses Event Grid + Functions or Durable Functions. GCP uses Eventarc + Workflows + Cloud Run Jobs. The skill contract stays the same, but each cloud keeps its own worker and blast radius.</text>
    </g>
  </g>
</svg>
