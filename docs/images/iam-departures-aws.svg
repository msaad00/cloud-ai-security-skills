<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="860" viewBox="0 0 1280 860" role="img" aria-labelledby="title desc">
  <title id="title">IAM departures remediation · AWS flagship write path</title>
  <desc id="desc">AWS-only IAM departures remediation flow. Plan reads HR sources, runs the reconciler, and writes an actionable S3 manifest. Orchestrate uses EventBridge and Step Functions to fan out one execution per user through parser and worker Lambdas. Write performs the ordered IAM teardown inside AWS only. Audit dual-writes to DynamoDB and KMS-encrypted S3, and the next run ingests audit state back for drift verification. A footer notes that Azure and GCP use their own native orchestration stacks rather than sharing one worker.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07101f"/>
      <stop offset="100%" stop-color="#0f1a33"/>
    </linearGradient>
    <radialGradient id="glowA" cx="20%" cy="14%" r="62%">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#2563eb" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="84%" cy="22%" r="46%">
      <stop offset="0%" stop-color="#14b8a6" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#14b8a6" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" x="0" y="0" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M36 0H0V36" fill="none" stroke="#1d2942" stroke-opacity="0.36" stroke-width="1"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#020617" flood-opacity="0.42"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0L10 5L0 10z" fill="#7dd3fc"/>
    </marker>
    <marker id="arrowAmber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0L10 5L0 10z" fill="#fbbf24"/>
    </marker>
    <marker id="arrowPink" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0L10 5L0 10z" fill="#f472b6"/>
    </marker>
  </defs>

  <rect width="1280" height="860" fill="url(#bg)"/>
  <rect width="1280" height="860" fill="url(#grid)"/>
  <rect width="1280" height="860" fill="url(#glowA)"/>
  <rect width="1280" height="860" fill="url(#glowB)"/>

  <g font-family="Inter, Arial, sans-serif">
    <g transform="translate(56,44)">
      <rect x="0" y="0" width="186" height="32" rx="16" fill="#2a1708" stroke="#f59e0b"/>
      <text x="24" y="21" fill="#fbbf24" font-size="11" font-weight="800" letter-spacing="1.5">AWS FLAGSHIP WRITE PATH</text>
    </g>

    <text x="56" y="118" font-size="40" font-weight="900" fill="#f8fafc">IAM departures remediation</text>
    <text x="56" y="150" font-size="17" fill="#cbd5e1">Guarded, event-driven, dual-audited, and one cloud per worker. No cross-cloud blast radius in a single execution path.</text>

    <g transform="translate(56,188)" font-size="12" font-weight="800" letter-spacing="1.5">
      <text x="0" y="0" fill="#22d3ee">① PLAN</text>
      <text x="292" y="0" fill="#60a5fa">② ORCHESTRATE</text>
      <text x="584" y="0" fill="#fbbf24">③ WRITE</text>
      <text x="920" y="0" fill="#2dd4bf">④ AUDIT</text>
    </g>
    <g transform="translate(56,208)" font-size="11" fill="#64748b">
      <text x="0" y="0">scope the actionable set</text>
      <text x="292" y="0">re-check state before destructive action</text>
      <text x="584" y="0">ordered AWS IAM teardown only</text>
      <text x="920" y="0">dual store plus ingest-back verification</text>
    </g>

    <g filter="url(#shadow)">
      <rect x="56" y="232" width="240" height="378" rx="28" fill="#0b1a2e" stroke="#22d3ee"/>
      <rect x="348" y="232" width="240" height="378" rx="28" fill="#0f1d36" stroke="#60a5fa"/>
      <rect x="640" y="232" width="308" height="378" rx="28" fill="#2a1708" stroke="#fbbf24"/>
      <rect x="1000" y="232" width="224" height="378" rx="28" fill="#0b3d3b" stroke="#2dd4bf"/>
    </g>

    <g transform="translate(80,268)">
      <rect x="0" y="0" width="192" height="56" rx="16" fill="#0f2036" stroke="#334155"/>
      <text x="18" y="24" fill="#e0f2fe" font-size="16" font-weight="800">HR sources</text>
      <text x="18" y="44" fill="#94a3b8" font-size="12">Snowflake · Databricks · Workday-shape inputs</text>

      <path d="M96,64 L96,86" stroke="#7dd3fc" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

      <rect x="0" y="98" width="192" height="72" rx="16" fill="#0f2036" stroke="#334155"/>
      <text x="18" y="124" fill="#e0f2fe" font-size="16" font-weight="800">Reconciler</text>
      <text x="18" y="146" fill="#94a3b8" font-size="12">rehire-aware</text>
      <text x="18" y="162" fill="#94a3b8" font-size="12">grace window enforced</text>

      <path d="M96,178 L96,200" stroke="#7dd3fc" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

      <rect x="0" y="212" width="192" height="72" rx="16" fill="#102c29" stroke="#34d399"/>
      <text x="18" y="238" fill="#d1fae5" font-size="16" font-weight="800">S3 manifest</text>
      <text x="18" y="260" fill="#94a3b8" font-size="12">actionable set only</text>
      <text x="18" y="276" fill="#94a3b8" font-size="12">immutable handoff to orchestration</text>
    </g>

    <path d="M296 420H334" stroke="#7dd3fc" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
    <text x="315" y="406" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="800">PutObject</text>

    <g transform="translate(372,268)">
      <rect x="0" y="0" width="192" height="56" rx="16" fill="#152746" stroke="#60a5fa"/>
      <text x="18" y="24" fill="#dbeafe" font-size="16" font-weight="800">EventBridge rule</text>
      <text x="18" y="44" fill="#94a3b8" font-size="12">S3 ObjectCreated trigger</text>

      <path d="M96,64 L96,86" stroke="#7dd3fc" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

      <rect x="0" y="98" width="192" height="72" rx="16" fill="#152746" stroke="#60a5fa"/>
      <text x="18" y="124" fill="#dbeafe" font-size="16" font-weight="800">Step Functions</text>
      <text x="18" y="146" fill="#94a3b8" font-size="12">Map state</text>
      <text x="18" y="162" fill="#94a3b8" font-size="12">one execution per user</text>

      <path d="M96,178 L96,200" stroke="#7dd3fc" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

      <rect x="0" y="212" width="192" height="56" rx="16" fill="#321d09" stroke="#fbbf24"/>
      <text x="18" y="236" fill="#fef3c7" font-size="16" font-weight="800">Parser Lambda</text>
      <text x="18" y="256" fill="#94a3b8" font-size="12">re-check manifest and live IAM state</text>

      <path d="M96,276 L96,298" stroke="#7dd3fc" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

      <rect x="0" y="310" width="192" height="56" rx="16" fill="#321d09" stroke="#fbbf24"/>
      <text x="18" y="334" fill="#fef3c7" font-size="16" font-weight="800">Worker Lambda</text>
      <text x="18" y="354" fill="#94a3b8" font-size="12">scoped cross-account execution</text>
    </g>

    <path d="M588 420H626" stroke="#fbbf24" stroke-width="4" fill="none" marker-end="url(#arrowAmber)"/>
    <text x="607" y="406" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="800">AssumeRole</text>

    <g transform="translate(664,268)">
      <rect x="0" y="0" width="260" height="74" rx="16" fill="#321d09" stroke="#fbbf24"/>
      <text x="18" y="26" fill="#fef3c7" font-size="16" font-weight="800">AWS IAM write scope</text>
      <text x="18" y="48" fill="#94a3b8" font-size="12">Org-bounded cross-account role</text>
      <text x="18" y="64" fill="#94a3b8" font-size="12">aws:PrincipalOrgID and per-user checkpoint flow</text>

      <rect x="0" y="98" width="260" height="244" rx="16" fill="#161230" stroke="#a78bfa"/>
      <text x="18" y="126" fill="#ddd6fe" font-size="13" font-weight="800" letter-spacing="1.1">ORDERED TEARDOWN</text>
      <text x="18" y="148" fill="#ede9fe" font-size="13">1. deactivate access keys</text>
      <text x="18" y="168" fill="#ede9fe" font-size="13">2. delete login profile</text>
      <text x="18" y="188" fill="#ede9fe" font-size="13">3. remove from groups</text>
      <text x="18" y="208" fill="#ede9fe" font-size="13">4. detach managed policies</text>
      <text x="18" y="228" fill="#ede9fe" font-size="13">5. delete inline policies</text>
      <text x="18" y="248" fill="#ede9fe" font-size="13">6. delete MFA devices</text>
      <text x="18" y="268" fill="#ede9fe" font-size="13">7. delete signing certificates</text>
      <text x="18" y="288" fill="#ede9fe" font-size="13">8. delete SSH keys</text>
      <text x="18" y="308" fill="#ede9fe" font-size="13">9. delete service credentials</text>
      <text x="18" y="328" fill="#ede9fe" font-size="13">10. tag user for audit</text>
      <text x="18" y="350" fill="#f3e8ff" font-size="13" font-weight="900">11. delete IAM user</text>
    </g>

    <path d="M948 420H986" stroke="#2dd4bf" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
    <text x="967" y="406" text-anchor="middle" fill="#2dd4bf" font-size="11" font-weight="800">audit</text>

    <g transform="translate(1024,268)">
      <rect x="0" y="0" width="176" height="74" rx="16" fill="#10342e" stroke="#2dd4bf"/>
      <text x="18" y="26" fill="#ccfbf1" font-size="16" font-weight="800">DynamoDB audit</text>
      <text x="18" y="48" fill="#94a3b8" font-size="12">fast lookup</text>
      <text x="18" y="64" fill="#94a3b8" font-size="12">user + timestamp keyed rows</text>

      <path d="M88,82 L88,104" stroke="#7dd3fc" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

      <rect x="0" y="116" width="176" height="74" rx="16" fill="#10342e" stroke="#2dd4bf"/>
      <text x="18" y="142" fill="#ccfbf1" font-size="16" font-weight="800">S3 + KMS evidence</text>
      <text x="18" y="164" fill="#94a3b8" font-size="12">immutable JSON audit</text>
      <text x="18" y="180" fill="#94a3b8" font-size="12">seven-year retention path</text>

      <path d="M88,198 L88,220" stroke="#7dd3fc" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

      <rect x="0" y="232" width="176" height="74" rx="16" fill="#10342e" stroke="#2dd4bf"/>
      <text x="18" y="258" fill="#ccfbf1" font-size="16" font-weight="800">Ingest back</text>
      <text x="18" y="280" fill="#94a3b8" font-size="12">next reconciler run verifies</text>
      <text x="18" y="296" fill="#94a3b8" font-size="12">closure or drift</text>
    </g>

    <path d="M1112 574 C1112 666 646 720 196 720 C126 720 72 672 72 620 L72 430 L268 430"
          fill="none" stroke="#f472b6" stroke-width="2.5" stroke-dasharray="7 6" marker-end="url(#arrowPink)"/>
    <rect x="522" y="704" width="238" height="30" rx="15" fill="#161230" stroke="#f472b6"/>
    <text x="641" y="723" text-anchor="middle" fill="#f9a8d4" font-size="12" font-weight="800">closed-loop drift verification</text>

    <g transform="translate(56,770)">
      <rect x="0" y="0" width="1168" height="48" rx="14" fill="#091120" stroke="#475569"/>
      <text x="18" y="20" fill="#f1f5f9" font-size="12" font-weight="800" letter-spacing="0.4">One cloud per worker</text>
      <text x="18" y="36" fill="#94a3b8" font-size="11">AWS is the shipped orchestration. Azure uses Event Grid + Functions / Durable Functions. GCP uses Eventarc + Workflows + Cloud Run Jobs. Equivalent primitives, native per cloud, no single worker spanning AWS, Azure, and GCP.</text>
    </g>
  </g>
</svg>
